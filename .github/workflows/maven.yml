# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Dar permisos
      run: chmod +x mvnw
    - name: Compilar el proyecto
      run: ./mvnw compile --no-transfer-progress
    - name: Ejecucion de los tests
      run: ./mvnw verify --no-transfer-progress
    - name: Imprimir mensaje de fallo  
      if: failure()
      run: echo "Ha fallado los tests" 
    - name: Publish Test Report
      uses: ctrf-io/github-test-reporter@v1
      with:
        report-path: 'target/failsafe-reports/*.xml'
        github-report: true
      if: always()
    - name: Generar el badge de Jacoco
      if: always()
      uses: cicirello/jacoco-badge-generator@v2
      with:
        generate-branches-badge: true

    - name: Guardar el badge en el repositorio
      if: always()
      run: |
        if [[ `git status --porcelain` ]]; then
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add -A
          git commit -m "Autogenerated JaCoCo coverage badge"
          git push
        fi  
