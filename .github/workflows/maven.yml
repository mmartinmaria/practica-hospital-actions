# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Practica 6

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

permissions:
  contents: write
  checks: write
  pull-requests: write

jobs:
  build-and-test:

    runs-on: ubuntu-latest

    steps:
    # 1 -- Checkout source code
    - name: Checkout source code
      uses: actions/checkout@v4

    # 2 -- Set up JDK 21  
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # 3 -- Dar permisos a maven para poder compilar el proyecto   
    - name: Dar permisos
      run: chmod +x mvnw

    # 4 -- Compilar el proyecto
    - name: Compilar el proyecto
      run: ./mvnw compile --no-transfer-progress

    # 5 -- Ejecutar los tests unitorios y los de integracion  
    - name: Ejecucion de los tests
      run: ./mvnw verify --no-transfer-progress

    # 5.1 -- Si falla que nos imprima un mensaje  
    - name: Imprimir mensaje de fallo  
      if: failure()
      run: echo "Ha fallado los tests" 

    # 6 -- Resultados de los tests incluso si falla
    - name: Publish Test Report
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: Test Results
        report-path: '**/target/surefire-reports/TEST-*.xml,**/target/failsafe-reports/TEST-*.xml'
        reporter: java-junit
        fail-on-error: false

      # 7 ── Crea un artefacto para que no se borre al ejecutar el workflow
    - name: Upload test artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-reports
        path: |
          **/target/surefire-reports/TEST-*.xml
          **/target/failsafe-reports/TEST-*.xml
        retention-days: 7
      
    - name: Generar el badge de Jacoco
      if: always()
      id: jacoco
      uses: cicirello/jacoco-badge-generator@v2
      with:
        generate-branches-badge: true
        jacoco-csv-file: "**/jacoco.csv"

  # 9 ── Log coverage information
    - name: Log coverage percentage
      run: |
        echo "coverage = ${{ steps.jacoco.outputs.coverage }}"
        echo "branch coverage = ${{ steps.jacoco.outputs.branches }}"    

  #9 --- Si cambia lo pone en el respositorio
    - name: Guardar el badge en el repositorio
      if: always()
      run: |
        if [[ `git status --porcelain` ]]; then
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add -A
          git commit -m "Autogenerated JaCoCo coverage badge"
          git push
        fi  
